name: UK Job Digest — Senior Kotlin/Java Contracts

on:
  schedule:
    # Every day at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      delivery:
        description: "Delivery mode (email / console)"
        required: false
        default: "email"

permissions:
  contents: write   # needed to commit job_vacancies.json back to repo

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run job digest
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          REED_API_KEY:   ${{ secrets.REED_API_KEY }}
          DELIVERY:       ${{ github.event.inputs.delivery || 'email' }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          SMTP_HOST:      ${{ secrets.SMTP_HOST }}
          SMTP_PORT:      ${{ secrets.SMTP_PORT }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
        run: python job_digest.py

      - name: Commit updated vacancies archive
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/job_vacancies.json
          # only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update job vacancies archive $(date -u +%Y-%m-%d)"
          git push
